name: Build VSIX on Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-vsix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Compile extension
        run: npm run compile

      - name: Package extension
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_FILE="${PACKAGE_NAME}-${PACKAGE_VERSION}.vsix"
          npx vsce package --out "$PACKAGE_FILE"
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> "$GITHUB_ENV"
          echo "PACKAGE_FILE=$PACKAGE_FILE" >> "$GITHUB_ENV"

      - name: Publish extension
        id: publish_extension
        continue-on-error: true
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
        run: |
          if [ -z "$VSCE_TOKEN" ]; then
            echo "::warning::VSCE_TOKEN secret is missing. Skipping publish."
            exit 0
          fi
          npx vsce publish --packagePath "$PACKAGE_FILE" --pat "$VSCE_TOKEN"

      - name: Warn if publish failed
        if: ${{ always() && steps.publish_extension.outcome == 'failure' }}
        run: echo "::warning::Extension publish failed (token missing, expired, or insufficient permissions). Artifacts will still be generated and uploaded."

      - name: Prepare artifacts
        if: ${{ always() }}
        run: |
          if [ ! -f "$PACKAGE_FILE" ]; then
            echo "VSIX package $PACKAGE_FILE not found" >&2
            exit 1
          fi
          LATEST_FILE="${PACKAGE_NAME}.vsix"
          cp "$PACKAGE_FILE" "$LATEST_FILE"
          echo "LATEST_FILE=$LATEST_FILE" >> "$GITHUB_ENV"

      - name: Upload workflow artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: vscode-netconf-vsix
          path: |
            ${{ env.PACKAGE_FILE }}
            ${{ env.LATEST_FILE }}

      - name: Attach VSIX to release
        if: ${{ always() && github.event_name == 'release' }}
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ env.PACKAGE_FILE }}
            ${{ env.LATEST_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
